<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>start</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      [x-cloak] { display: none; }

      .page-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -20;
        background: linear-gradient(135deg, rgba(236, 253, 245, 0.9) 0%, rgba(255, 255, 255, 0.95) 45%, rgba(255, 251, 235, 0.9) 100%);
      }

      .page-grid {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -10;
        background-image:
          linear-gradient(to right, rgba(16, 185, 129, 0.06) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(16, 185, 129, 0.06) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      .page-glow {
        position: fixed;
        border-radius: 9999px;
        filter: blur(40px);
        opacity: 0.35;
        pointer-events: none;
        z-index: -5;
      }

    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          },
        },
      }
    </script>
  </head>
  <body class="text-gray-900 min-h-screen font-sans antialiased overflow-x-hidden">

    <!-- Global background atmosphere -->
    <div class="page-bg"></div>
    <div class="page-grid"></div>
    <div class="page-glow bg-emerald-300 h-72 w-72 -top-16 -left-20"></div>
    <div class="page-glow bg-amber-300 h-80 w-80 top-1/3 -right-24"></div>
    <div class="page-glow bg-indigo-300 h-64 w-64 bottom-0 left-1/3"></div>

    <!-- Toast container -->
    <div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80 pointer-events-none"></div>

    <!-- Header -->
    <header class="relative bg-transparent px-6 py-5">

      <div class="flex items-center justify-between gap-4">
        <div>
          <div class="flex items-center">
            <span class="text-2xl font-semibold tracking-[0.02em] text-gray-500/90 drop-shadow-[0_1px_0_rgba(255,255,255,0.6)]">start.lommers.org</span>
          </div>
        </div>
        <form action="/logout" method="post">
          <button type="submit"
            class="inline-flex items-center rounded-xl border border-gray-200 bg-white/80 px-3 py-2 text-sm font-medium text-gray-600 shadow-sm transition hover:border-gray-300 hover:text-gray-900">
            Log out
          </button>
        </form>
      </div>
    </header>

    <main class="w-[90vw] max-w-none mx-auto px-4 py-8">

      <!-- Tab bar -->
      <div class="flex gap-2 mb-6" role="tablist">
        <button class="tab-btn flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-xl transition-all duration-200 border-2 border-transparent hover:border-indigo-200" data-tab="bookmarks" role="tab">
          <span class="text-lg">🔖</span>
          <span>Bookmarks</span>
        </button>
        <button class="tab-btn flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-xl transition-all duration-200 border-2 border-transparent hover:border-amber-200" data-tab="mail" role="tab">
          <span class="text-lg">📤</span>
          <span>Notify</span>
        </button>
        <button class="tab-btn flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-xl transition-all duration-200 border-2 border-transparent hover:border-emerald-200" data-tab="storage" role="tab">
          <span class="text-lg">💾</span>
          <span>Storage</span>
        </button>
        <button class="tab-btn flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-xl transition-all duration-200 border-2 border-transparent hover:border-rose-200" data-tab="reading-list" role="tab">
          <span class="text-lg">📚</span>
          <span>Reading List</span>
        </button>
      </div>

      <!-- ── Reading List ─────────────────────────────────────── -->
      <section id="tab-reading-list" class="tab-panel bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
        <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
          <h2 class="text-base font-semibold">Reading List</h2>
          <div class="flex items-center gap-3">
            <a id="reading-list-bookmarklet" href="#"
              class="inline-flex items-center rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs font-medium text-rose-700 hover:bg-rose-100"
              title="Drag this to your bookmarks bar">
              + Reading List Bookmarklet
            </a>
            <button onclick="loadReadingListItems()" class="text-xs text-rose-600 hover:underline">Refresh</button>
          </div>
        </div>
        <p class="mb-3 text-xs text-gray-500">Drag the bookmarklet button to your browser bookmarks bar, then click it on any page to save that URL.</p>
        <ul id="reading-list-items" class="divide-y divide-gray-100 text-sm text-gray-700 min-h-[2rem]">
          <li class="py-2 text-xs text-gray-400">Loading…</li>
        </ul>
      </section>

      <!-- ── Mail ─────────────────────────────────────────────── -->
      <section id="tab-mail" class="tab-panel bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
        <h2 class="text-base font-semibold mb-4">Notify</h2>
        <form id="mail-form" class="space-y-3">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Body <span class="font-normal text-gray-400">(prefix <code class="font-mono">w </code> for work)</span></label>
            <textarea id="mail-body" rows="4"
              class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"
              placeholder="Your message…" required></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Attachments <span class="font-normal text-gray-400">(optional)</span></label>
            <input id="mail-files" type="file" multiple
              class="block w-full text-sm text-gray-500 file:mr-3 file:rounded-lg file:border-0 file:bg-amber-50 file:px-3 file:py-1.5 file:text-xs file:font-medium file:text-amber-700 hover:file:bg-amber-100" />
          </div>
          <button type="submit"
            class="w-full rounded-lg bg-amber-600 px-4 py-2 text-sm font-medium text-white hover:bg-amber-700 active:bg-amber-800 transition-colors">
            Send
          </button>
        </form>
      </section>

      <!-- ── Storage ───────────────────────────────────────────── -->
      <section id="tab-storage" class="tab-panel bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
        <h2 class="text-base font-semibold mb-4">Storage</h2>

        <!-- Upload -->
        <form id="storage-form" class="space-y-3 mb-5">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Upload files</label>
            <input id="storage-files" type="file" multiple required
              class="block w-full text-sm text-gray-500 file:mr-3 file:rounded-lg file:border-0 file:bg-emerald-50 file:px-3 file:py-1.5 file:text-xs file:font-medium file:text-emerald-700 hover:file:bg-emerald-100" />
          </div>
          <button type="submit"
            class="w-full rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700 active:bg-emerald-800 transition-colors">
            Upload
          </button>
        </form>

        <!-- File list -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-medium text-gray-500">Stored files</span>
            <button onclick="loadStorageFiles()"
              class="text-xs text-emerald-600 hover:underline">Refresh</button>
          </div>
          <ul id="storage-list" class="divide-y divide-gray-100 text-sm text-gray-700 min-h-[2rem]">
            <li class="py-2 text-xs text-gray-400">Loading…</li>
          </ul>
        </div>
      </section>

      <!-- ── Bookmarks ─────────────────────────────────────────── -->
      <section id="tab-bookmarks" class="tab-panel bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
        <div class="flex flex-col gap-3 mb-4">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold">Bookmarks</h2>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="show-hidden-toggle" class="w-4 h-4 rounded" />
              <span class="text-xs text-gray-500">Show hidden</span>
            </label>
          </div>
          <input type="text" id="search-bookmarks" placeholder="Search bookmarks…"
            class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>

        <!-- Bookmark list -->
        <div id="bookmarks-list" class="grid gap-3 text-sm md:grid-cols-2 xl:grid-cols-4 mb-5"></div>

        <!-- Add category -->
        <form id="category-form" class="flex gap-2 mb-4">
          <input id="category-name" type="text" placeholder="New category…"
            class="flex-1 rounded-lg border border-gray-200 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" required />
          <button type="submit"
            class="rounded-lg bg-indigo-50 px-3 py-1.5 text-xs font-medium text-indigo-700 hover:bg-indigo-100 transition-colors">
            + Category
          </button>
        </form>

        <!-- Add bookmark -->
        <form id="bookmark-form" class="space-y-2 mb-4">
          <select id="bookmark-category"
            class="w-full rounded-lg border border-gray-200 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <option value="">Select category…</option>
          </select>
          <input id="bookmark-url" type="url" placeholder="https://…"
            class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" required />
          <input id="bookmark-title" type="text" placeholder="Title (optional)"
            class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          <button type="submit"
            class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 transition-colors">
            Add Bookmark
          </button>
        </form>
      </section>

    </main>

    <script>
      // ── Utilities ──────────────────────────────────────────────

      function toast(msg, type = 'success') {
        const el = document.createElement('div')
        const colors = type === 'error'
          ? 'bg-red-600 text-white'
          : type === 'warn'
          ? 'bg-amber-500 text-white'
          : 'bg-gray-900 text-white'
        el.className = `pointer-events-auto rounded-xl px-4 py-3 text-sm shadow-lg ${colors}`
        el.textContent = msg
        document.getElementById('toasts').appendChild(el)
        setTimeout(() => el.remove(), 4000)
      }

      async function apiFetch(path, opts = {}) {
        const res = await fetch(path, opts)
        if (res.status === 401) {
          window.location.href = `/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`
          throw new Error('Authentication required')
        }
        if (!res.ok) {
          let errMsg = `HTTP ${res.status}`
          try {
            const body = await res.json()
            if (body.error) errMsg = body.error
          } catch (_) {}
          throw new Error(errMsg)
        }
        const ct = res.headers.get('content-type') || ''
        if (ct.includes('application/json')) return res.json()
        return null
      }

      function fmt(bytes) {
        if (bytes < 1024) return bytes + ' B'
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB'
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB'
      }

      function fmtDateTime(iso) {
        if (!iso) return 'Unknown time'
        const d = new Date(iso)
        if (Number.isNaN(d.getTime())) return 'Unknown time'

        const now = Date.now()
        const diffMs = Math.max(0, now - d.getTime())
        const minute = 60 * 1000
        const hour = 60 * minute
        const day = 24 * hour
        const week = 7 * day

        let relative
        if (diffMs < minute) {
          relative = 'just now'
        } else if (diffMs < hour) {
          const mins = Math.floor(diffMs / minute)
          relative = `${mins} minute${mins === 1 ? '' : 's'} ago`
        } else if (diffMs < day) {
          const hours = Math.floor(diffMs / hour)
          relative = `${hours} hour${hours === 1 ? '' : 's'} ago`
        } else if (diffMs < week) {
          const days = Math.floor(diffMs / day)
          relative = `${days} day${days === 1 ? '' : 's'} ago`
        } else {
          const weeks = Math.floor(diffMs / week)
          relative = `${weeks} week${weeks === 1 ? '' : 's'} ago`
        }

        return `${d.toLocaleString()} (${relative})`
      }

      function isImageFile(file) {
        const contentType = String(file.content_type || '').toLowerCase()
        if (contentType.startsWith('image/')) return true
        return /\.(png|jpe?g|gif|webp|bmp|svg|avif)$/i.test(String(file.filename || ''))
      }

      function getFileTile(file) {
        const contentType = String(file.content_type || '').toLowerCase()
        const filename = String(file.filename || '').toLowerCase()

        if (contentType === 'application/pdf' || /\.pdf$/i.test(filename)) {
          return { icon: '📄', label: 'PDF', classes: 'border-red-200 bg-red-50 text-red-700' }
        }

        // Microsoft Excel and common spreadsheet formats
        if (
          contentType.includes('spreadsheetml') ||
          contentType.includes('ms-excel') ||
          /\.(xlsx|xls|xlsm|csv|ods)$/i.test(filename)
        ) {
          return { icon: '📊', label: 'XLS', classes: 'border-emerald-200 bg-emerald-50 text-emerald-700' }
        }

        // Word and rich text docs
        if (
          contentType.includes('wordprocessingml') ||
          contentType.includes('msword') ||
          /\.(docx|doc|rtf|odt)$/i.test(filename)
        ) {
          return { icon: '📝', label: 'DOC', classes: 'border-blue-200 bg-blue-50 text-blue-700' }
        }

        // PowerPoint decks
        if (
          contentType.includes('presentationml') ||
          contentType.includes('ms-powerpoint') ||
          /\.(pptx|ppt|odp)$/i.test(filename)
        ) {
          return { icon: '📽️', label: 'PPT', classes: 'border-orange-200 bg-orange-50 text-orange-700' }
        }

        // Archives and compressed files
        if (
          contentType.includes('zip') ||
          contentType.includes('gzip') ||
          contentType.includes('x-tar') ||
          /\.(zip|gz|tgz|tar|rar|7z)$/i.test(filename)
        ) {
          return { icon: '🗜️', label: 'ZIP', classes: 'border-amber-200 bg-amber-50 text-amber-700' }
        }

        // Audio files
        if (contentType.startsWith('audio/') || /\.(mp3|wav|m4a|ogg|flac|aac)$/i.test(filename)) {
          return { icon: '🎵', label: 'AUDIO', classes: 'border-fuchsia-200 bg-fuchsia-50 text-fuchsia-700' }
        }

        // Video files
        if (contentType.startsWith('video/') || /\.(mp4|mov|avi|mkv|webm|m4v)$/i.test(filename)) {
          return { icon: '🎬', label: 'VIDEO', classes: 'border-violet-200 bg-violet-50 text-violet-700' }
        }

        // Code, data, and text files
        if (
          contentType.startsWith('text/') ||
          contentType.includes('json') ||
          contentType.includes('xml') ||
          /\.(txt|md|json|xml|yaml|yml|toml|ini|log|go|js|ts|py|sh|html|css)$/i.test(filename)
        ) {
          return { icon: '💻', label: 'TEXT', classes: 'border-slate-200 bg-slate-50 text-slate-700' }
        }

        return { icon: '📁', label: 'FILE', classes: 'border-gray-200 bg-gray-100 text-gray-700' }
      }

      // ── Mail ──────────────────────────────────────────────────

      document.getElementById('mail-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const body = document.getElementById('mail-body').value.trim()
        const files = document.getElementById('mail-files').files

        const fd = new FormData()
        fd.append('body', body)
        for (const f of files) fd.append('attachments', f)

        try {
          await apiFetch('/api/mail/send', { method: 'POST', body: fd })
          toast('Mail sent')
          e.target.reset()
        } catch (err) {
          toast(err.message, 'error')
        }
      })

      // ── Storage ───────────────────────────────────────────────

      async function loadStorageFiles() {
        const list = document.getElementById('storage-list')
        try {
          const files = await apiFetch('/api/storage/files')
          if (!files || files.length === 0) {
            list.innerHTML = '<li class="py-2 text-xs text-gray-400">No files stored.</li>'
            return
          }
          list.innerHTML = files.map(f => {
            const fileUrl = `/api/storage/files/${encodeURIComponent(f.filename)}`
            const preview = isImageFile(f)
              ? `<img src="${fileUrl}" alt="" loading="lazy" class="h-[100px] w-[100px] rounded border border-gray-200 object-cover shrink-0 bg-white" />`
              : (() => {
                  const tile = getFileTile(f)
                  return `<div class="h-[100px] w-[100px] rounded shrink-0 flex flex-col items-center justify-center border ${tile.classes}">
                    <span class="text-2xl leading-none">${tile.icon}</span>
                    <span class="mt-1 text-[10px] font-semibold">${tile.label}</span>
                  </div>`
                })()

            return `
            <li class="py-2 flex items-center justify-between gap-2">
              <div class="min-w-0 flex items-center gap-2 flex-1">
                ${preview}
                <div class="min-w-0">
                  <a href="${fileUrl}"
                     target="_blank"
                     class="truncate text-emerald-600 hover:underline text-xs font-mono block"
                     title="${escHtml(f.filename)}">${escHtml(f.filename)}</a>
                  <span class="text-[11px] text-gray-400">Uploaded: ${escHtml(fmtDateTime(f.uploaded_at))}</span>
                </div>
              </div>
              <span class="text-xs text-gray-400 shrink-0">${fmt(f.size)}</span>
            </li>`
          }).join('')
        } catch (err) {
          list.innerHTML = `<li class="py-2 text-xs text-red-500">${escHtml(err.message)}</li>`
        }
      }

      document.getElementById('storage-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const files = document.getElementById('storage-files').files
        if (!files.length) return

        const fd = new FormData()
        for (const f of files) fd.append('files', f)

        try {
          const res = await apiFetch('/api/storage/uploads', { method: 'POST', body: fd })
          const msg = res.failed > 0
            ? `Uploaded ${res.uploaded}, failed ${res.failed}`
            : `Uploaded ${res.uploaded} file${res.uploaded !== 1 ? 's' : ''}`
          toast(msg, res.failed > 0 ? 'warn' : 'success')
          e.target.reset()
          loadStorageFiles()
        } catch (err) {
          toast(err.message, 'error')
        }
      })

      // ── Reading List ──────────────────────────────────────────

      async function loadReadingListItems() {
        const list = document.getElementById('reading-list-items')
        try {
          const items = await apiFetch('/api/reading-list/items')
          if (!items || items.length === 0) {
            list.innerHTML = '<li class="py-2 text-xs text-gray-400">No reading list items yet.</li>'
            return
          }

          list.innerHTML = items.map((item) => {
            const title = String(item.title || '').trim() || item.url
            return `
              <li class="py-2.5 flex items-start justify-between gap-2">
                <div class="min-w-0 flex-1">
                  <a href="${escAttr(item.url)}" target="_blank" rel="noopener noreferrer"
                     class="truncate text-rose-600 hover:underline text-sm font-medium block"
                     title="${escAttr(title)}">${escHtml(title)}</a>
                  <p class="truncate text-xs text-gray-500" title="${escAttr(item.url)}">${escHtml(item.url)}</p>
                </div>
                <span class="text-[11px] text-gray-400 shrink-0">${escHtml(fmtDateTime(item.created_at))}</span>
              </li>`
          }).join('')
        } catch (err) {
          list.innerHTML = `<li class="py-2 text-xs text-red-500">${escHtml(err.message)}</li>`
        }
      }

      function initReadingListBookmarklet() {
        const link = document.getElementById('reading-list-bookmarklet')
        if (!link) return

        const apiBase = window.location.origin
        const bookmarklet = `javascript:(()=>{const cur=location.href;location.href='${apiBase}/api/reading-list/bookmarklet-input?url='+encodeURIComponent(cur)+'&return_to='+encodeURIComponent(cur)+'&_='+Date.now()})()`
        link.setAttribute('href', bookmarklet)
      }

      // ── Bookmarks ─────────────────────────────────────────────

      let categoriesCache = []
      let allBookmarksCache = []

      function fuzzyMatch(needle, haystack) {
        needle = needle.toLowerCase()
        haystack = haystack.toLowerCase()
        let needleIdx = 0
        for (let i = 0; i < haystack.length; i++) {
          if (needle[needleIdx] === haystack[i]) {
            needleIdx++
            if (needleIdx === needle.length) return true
          }
        }
        return false
      }

      async function loadCategories() {
        try {
          categoriesCache = await apiFetch('/api/categories') || []
          const sel = document.getElementById('bookmark-category')
          sel.innerHTML = '<option value="">Select category…</option>' +
            categoriesCache.map(c => `<option value="${c.id}">${escHtml(c.name)}</option>`).join('')
        } catch (err) {
          toast('Failed to load categories: ' + err.message, 'error')
        }
      }

      async function persistBookmarkOrder() {
        const ids = [...document.querySelectorAll('#bookmarks-list li[data-id]')]
          .map(el => Number(el.dataset.id))

        await apiFetch('/api/bookmarks/reorder', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids }),
        })
      }

      function bmRow(bm) {
        const li = document.createElement('li')
        li.className = `py-1.5 flex flex-col gap-2 cursor-default ${bm.hidden ? 'opacity-50' : ''}`
        li.dataset.id = bm.id

        const viewDiv = document.createElement('div')
        viewDiv.className = 'flex items-center gap-2'
        viewDiv.innerHTML = `
          <a href="${escAttr(bm.url)}" target="_blank" rel="noopener noreferrer"
             class="text-indigo-600 hover:underline truncate text-sm flex-1 ${bm.hidden ? 'line-through' : ''}">${escHtml(bm.title || bm.url)}</a>
          <button data-move-up="${bm.id}"
            class="text-xs text-gray-400 hover:text-indigo-600 transition-colors shrink-0 px-1" title="Move up">↑</button>
          <button data-move-down="${bm.id}"
            class="text-xs text-gray-400 hover:text-indigo-600 transition-colors shrink-0 px-1" title="Move down">↓</button>
          <button data-toggle-hidden="${bm.id}"
            class="text-xs text-gray-400 hover:text-indigo-600 transition-colors shrink-0 px-1" title="${bm.hidden ? 'Show bookmark' : 'Hide bookmark'}">${bm.hidden ? '👁️‍🗨️' : '👁️'}</button>
          <button data-edit="${bm.id}"
            class="text-xs text-gray-400 hover:text-indigo-600 transition-colors shrink-0 px-1" title="Edit">✎</button>
          <button data-delete="${bm.id}"
            class="text-xs text-gray-300 hover:text-red-500 transition-colors shrink-0 px-1" title="Delete">✕</button>`

        const editDiv = document.createElement('div')
        editDiv.className = 'hidden space-y-2 bg-gray-100 p-2 rounded text-xs'
        const catOptions = categoriesCache.map(c => `<option value="${c.id}" ${c.id === bm.category_id ? 'selected' : ''}>${escHtml(c.name)}</option>`).join('')
        editDiv.innerHTML = `
          <input type="text" data-edit-title value="${escAttr(bm.title)}"
            class="w-full rounded border border-gray-300 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400" placeholder="Title" />
          <input type="url" data-edit-url value="${escAttr(bm.url)}"
            class="w-full rounded border border-gray-300 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400" placeholder="URL" />
          <select data-edit-category
            class="w-full rounded border border-gray-300 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-400">
            ${catOptions}
          </select>
          <div class="flex gap-1">
            <button data-edit-save="${bm.id}" class="flex-1 rounded bg-indigo-600 px-2 py-1 text-xs font-medium text-white hover:bg-indigo-700">Save</button>
            <button data-edit-cancel="${bm.id}" class="flex-1 rounded bg-gray-300 px-2 py-1 text-xs font-medium text-gray-700 hover:bg-gray-400">Cancel</button>
          </div>`

        li.appendChild(viewDiv)
        li.appendChild(editDiv)

        return li
      }

      function renderBookmarks() {
        const container = document.getElementById('bookmarks-list')
        const includeHiddenToggle = document.getElementById('show-hidden-toggle')?.checked || false
        const searchQuery = document.getElementById('search-bookmarks')?.value.trim() || ''

        const filtered = allBookmarksCache.filter(bm => {
          const includeBecauseSearch = searchQuery.length > 0
          const matchesHidden = includeHiddenToggle || includeBecauseSearch || !bm.hidden
          if (!matchesHidden) return false

          if (!searchQuery) return true
          const title = String(bm.title || '')
          const text = `${title} ${bm.url}`
          return fuzzyMatch(searchQuery, text)
        })

        container.innerHTML = ''
        if (!filtered.length) {
          container.innerHTML = `<p class="text-xs text-gray-400">${searchQuery ? 'No bookmarks match your search.' : 'No bookmarks yet.'}</p>`
          return
        }

        const byCategory = {}
        for (const bm of filtered) {
          const cat = categoriesCache.find(c => c.id === bm.category_id)
          const catName = cat ? cat.name : 'Uncategorized'
          if (!byCategory[catName]) byCategory[catName] = []
          byCategory[catName].push(bm)
        }

        for (const [cat, items] of Object.entries(byCategory)) {
          const section = document.createElement('div')
          section.className = 'rounded-xl border border-gray-100 bg-gray-50/60 p-3'
          const label = document.createElement('p')
          label.className = 'text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1'
          label.textContent = cat
          const ul = document.createElement('ul')
          ul.className = 'divide-y divide-gray-100'
          items.forEach(bm => ul.appendChild(bmRow(bm)))
          section.appendChild(label)
          section.appendChild(ul)
          container.appendChild(section)
        }
      }

      async function loadBookmarks() {
        const container = document.getElementById('bookmarks-list')
        try {
          allBookmarksCache = await apiFetch('/api/bookmarks?include_hidden=true') || []
          renderBookmarks()
        } catch (err) {
          container.innerHTML = `<p class="text-xs text-red-500">${escHtml(err.message)}</p>`
        }
      }

      document.getElementById('bookmarks-list').onclick = async (e) => {
        const moveUpBtn = e.target.closest('[data-move-up]')
        if (moveUpBtn) {
          const row = moveUpBtn.closest('li[data-id]')
          if (!row || !row.previousElementSibling) {
            toast('Cannot move up: already at top', 'warn')
            return
          }
          row.parentNode.insertBefore(row, row.previousElementSibling)
          try {
            await persistBookmarkOrder()
            toast('Bookmark moved up')
            await loadBookmarks()
          } catch (err) {
            toast('Failed to move: ' + err.message, 'error')
            await loadBookmarks()
          }
          return
        }

        const moveDownBtn = e.target.closest('[data-move-down]')
        if (moveDownBtn) {
          const row = moveDownBtn.closest('li[data-id]')
          if (!row || !row.nextElementSibling) {
            toast('Cannot move down: already at bottom', 'warn')
            return
          }
          row.parentNode.insertBefore(row.nextElementSibling, row)
          try {
            await persistBookmarkOrder()
            toast('Bookmark moved down')
            await loadBookmarks()
          } catch (err) {
            toast('Failed to move: ' + err.message, 'error')
            await loadBookmarks()
          }
          return
        }

        const editBtn = e.target.closest('[data-edit]')
        if (editBtn) {
          const row = editBtn.closest('li[data-id]')
          if (!row) return
          const viewDiv = row.querySelector('div:first-child')
          const editDiv = row.querySelector('div:last-child')
          viewDiv.classList.add('hidden')
          editDiv.classList.remove('hidden')
          editDiv.querySelector('[data-edit-title]').focus()
          return
        }

        const cancelBtn = e.target.closest('[data-edit-cancel]')
        if (cancelBtn) {
          const row = cancelBtn.closest('li[data-id]')
          if (!row) return
          const viewDiv = row.querySelector('div:first-child')
          const editDiv = row.querySelector('div:last-child')
          viewDiv.classList.remove('hidden')
          editDiv.classList.add('hidden')
          return
        }

        const saveBtn = e.target.closest('[data-edit-save]')
        if (saveBtn) {
          const row = saveBtn.closest('li[data-id]')
          if (!row) return
          const id = Number(row.dataset.id)
          const title = row.querySelector('[data-edit-title]').value.trim()
          const url = row.querySelector('[data-edit-url]').value.trim()
          const category_id = Number(row.querySelector('[data-edit-category]').value)

          if (!title || !url || !category_id) {
            toast('All fields are required', 'warn')
            return
          }

          try {
            saveBtn.disabled = true
            await apiFetch(`/api/bookmarks/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ url, title, category_id }),
            })
            toast('Bookmark updated')
            await loadBookmarks()
          } catch (err) {
            toast('Failed to update: ' + err.message, 'error')
            saveBtn.disabled = false
          }
          return
        }

        const toggleBtn = e.target.closest('[data-toggle-hidden]')
        if (toggleBtn) {
          const row = toggleBtn.closest('li[data-id]')
          if (!row) return
          const id = Number(row.dataset.id)
          const isCurrentlyHidden = toggleBtn.textContent.includes('🗨️')
          try {
            await apiFetch(`/api/bookmarks/${id}/hidden`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ hidden: !isCurrentlyHidden }),
            })
            toast(!isCurrentlyHidden ? 'Bookmark hidden' : 'Bookmark shown')
            await loadBookmarks()
          } catch (err) {
            toast('Failed to toggle: ' + err.message, 'error')
          }
          return
        }

        const deleteBtn = e.target.closest('[data-delete]')
        if (!deleteBtn) return
        const id = Number(deleteBtn.dataset.delete)
        try {
          await apiFetch(`/api/bookmarks/${id}`, { method: 'DELETE' })
          toast('Bookmark deleted')
          await loadBookmarks()
        } catch (err) {
          toast(err.message, 'error')
        }
      }

      document.getElementById('category-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const name = document.getElementById('category-name').value.trim()
        try {
          await apiFetch('/api/categories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
          })
          toast(`Category "${name}" created`)
          document.getElementById('category-name').value = ''
          await loadCategories()
          await loadBookmarks()
        } catch (err) {
          toast(err.message, 'error')
        }
      })

      document.getElementById('bookmark-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const category_id = Number(document.getElementById('bookmark-category').value)
        const url = document.getElementById('bookmark-url').value.trim()
        const title = document.getElementById('bookmark-title').value.trim()
        if (!category_id) { toast('Select a category first', 'warn'); return }
        try {
          await apiFetch('/api/bookmarks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, title, category_id }),
          })
          toast('Bookmark added')
          document.getElementById('bookmark-url').value = ''
          document.getElementById('bookmark-title').value = ''
          await loadBookmarks()
        } catch (err) {
          toast(err.message, 'error')
        }
      })

      // ── XSS helpers ───────────────────────────────────────────
      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
      }
      function escAttr(s) { return escHtml(s) }

      // ── Tabs ──────────────────────────────────────────────
      const TAB_STORAGE_KEY = 'active-tab'

      function activateTab(name) {
        document.querySelectorAll('.tab-panel').forEach(el => el.classList.add('hidden'))
        document.querySelectorAll('.tab-btn').forEach(btn => {
          const active = btn.dataset.tab === name
          const tabName = btn.dataset.tab
          
          // Remove all color classes
          btn.classList.remove('text-indigo-600', 'text-rose-600', 'text-amber-600', 'text-emerald-600')
          btn.classList.remove('bg-indigo-50', 'bg-rose-50', 'bg-amber-50', 'bg-emerald-50')
          btn.classList.remove('border-indigo-300', 'border-rose-300', 'border-amber-300', 'border-emerald-300')
          btn.classList.remove('text-gray-500')
          
          if (active) {
            // Active state with tab-specific colors
            if (tabName === 'bookmarks') {
              btn.classList.add('bg-indigo-50', 'text-indigo-600', 'border-indigo-300')
            } else if (tabName === 'reading-list') {
              btn.classList.add('bg-rose-50', 'text-rose-600', 'border-rose-300')
            } else if (tabName === 'mail') {
              btn.classList.add('bg-amber-50', 'text-amber-600', 'border-amber-300')
            } else if (tabName === 'storage') {
              btn.classList.add('bg-emerald-50', 'text-emerald-600', 'border-emerald-300')
            }
          } else {
            // Inactive state
            btn.classList.add('text-gray-500')
          }
        })
        const panel = document.getElementById('tab-' + name)
        if (panel) panel.classList.remove('hidden')
        try { sessionStorage.setItem(TAB_STORAGE_KEY, name) } catch (_) {}
      }

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => activateTab(btn.dataset.tab))
      })

      // Show/hide hidden bookmarks toggle
      document.getElementById('show-hidden-toggle').addEventListener('change', () => {
        renderBookmarks()
      })

      document.getElementById('search-bookmarks').addEventListener('input', () => {
        renderBookmarks()
      })

      // Keyboard shortcut: press "f" to focus bookmark search.
      document.addEventListener('keydown', (e) => {
        if (e.defaultPrevented || e.repeat) return
        if (e.key.toLowerCase() !== 'f') return
        if (e.metaKey || e.ctrlKey || e.altKey) return

        const target = e.target
        const isEditable = target && (
          target.tagName === 'INPUT' ||
          target.tagName === 'TEXTAREA' ||
          target.tagName === 'SELECT' ||
          target.isContentEditable
        )
        if (isEditable) return

        const searchInput = document.getElementById('search-bookmarks')
        if (!searchInput) return

        // Ensure the bookmarks tab is visible before focusing.
        activateTab('bookmarks')
        e.preventDefault()
        searchInput.focus()
        searchInput.select()
      })

      // ── Init ─────────────────────────────────────────────────
      const savedTab = (() => { try { return sessionStorage.getItem(TAB_STORAGE_KEY) } catch (_) { return null } })()
      activateTab(savedTab || 'bookmarks')
      initReadingListBookmarklet()
      loadStorageFiles()
      loadReadingListItems()
      loadCategories().then(() => loadBookmarks())
    </script>
  </body>
</html>
