      tags:
      - bookmarks
    post:
      consumes:
      - application/json
      parameters:
      - description: Category payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.createCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.categoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Create a category
      tags:
      - bookmarks
  /api/categories/{id}:
    delete:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Delete a category
      tags:
      - bookmarks
  /api/mail/send:
    post:
      consumes:
      - application/json
      parameters:
      - description: Mail payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.sendMailRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpapi.sendMailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Send email message
      tags:
      - mail
  /app:
    get:
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
      summary: Dashboard HTML page
      tags:
      - dashboard
  /openapi.yaml:
    get:
      produces:
      - application/x-yaml
      responses:
        "200":
          description: OpenAPI YAML
          schema:
            type: string
      summary: OpenAPI specification
      tags:
      - docs
swagger: "2.0"
