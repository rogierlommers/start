basePath: /
definitions:
  httpapi.addReadingListItemRequest:
    properties:
      title:
        type: string
      url:
        type: string
    required:
    - url
    type: object
  httpapi.apiErrorResponse:
    properties:
      error:
        type: string
    type: object
  httpapi.bookmarkResponse:
    properties:
      category_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      position:
        type: integer
      title:
        type: string
      url:
        type: string
    type: object
  httpapi.categoryResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  httpapi.createBookmarkRequest:
    properties:
      category_id:
        type: integer
      title:
        type: string
      url:
        type: string
    required:
    - category_id
    - url
    type: object
  httpapi.createCategoryRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  httpapi.readingListItemResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      title:
        type: string
      url:
        type: string
    type: object
  httpapi.reorderBookmarksRequest:
    properties:
      ids:
        items:
          type: integer
        type: array
    required:
    - ids
    type: object
  httpapi.reorderBookmarksResponse:
    properties:
      status:
        type: string
    type: object
  httpapi.sendMailResponse:
    properties:
      status:
        type: string
    type: object
info:
  contact: {}
  description: API documentation generated from handler annotations.
  title: start API
  version: 0.1.0
paths:
  /api/bookmarks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpapi.bookmarkResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: List bookmarks
      tags:
      - bookmarks
    post:
      consumes:
      - application/json
      parameters:
      - description: Bookmark payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.createBookmarkRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.bookmarkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Create a bookmark
      tags:
      - bookmarks
  /api/bookmarks/{id}:
    delete:
      parameters:
      - description: Bookmark ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Delete a bookmark
      tags:
      - bookmarks
  /api/bookmarks/reorder:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Ordered bookmark IDs
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.reorderBookmarksRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.reorderBookmarksResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Reorder bookmarks
      tags:
      - bookmarks
  /api/categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpapi.categoryResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: List categories
      tags:
      - bookmarks
    post:
      consumes:
      - application/json
      parameters:
      - description: Category payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.createCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.categoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Create a category
      tags:
      - bookmarks
  /api/categories/{id}:
    delete:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Delete a category
      tags:
      - bookmarks
  /api/mail/send:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Email body
        in: formData
        name: body
        required: true
        type: string
      - description: File attachments (can be multiple)
        in: formData
        name: attachments
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/httpapi.sendMailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Send email message with optional attachments
      tags:
      - mail
  /api/reading-list/items:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpapi.readingListItemResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: List reading-list items
      tags:
      - reading-list
    post:
      consumes:
      - application/json
      parameters:
      - description: Reading-list payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.addReadingListItemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.readingListItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Add reading-list item
      tags:
      - reading-list
  /api/reading-list/rss:
    get:
      produces:
      - application/rss+xml
      responses:
        "200":
          description: RSS feed XML
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpapi.apiErrorResponse'
      summary: Reading-list RSS feed
      tags:
      - reading-list
swagger: "2.0"
